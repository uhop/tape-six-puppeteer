name: Windows

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      node-version:
        description: 'Node.js version to run tests'
        required: true
        default: 26
        type: number

jobs:
  tests:
    name: Node.js ${{inputs.node-version}} (special test)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: actions/setup-node@v7
        with:
          node-version: ${{inputs.node-version}}
      - run: |
          npm ci
          npm test
